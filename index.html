<!DOCTYPE html>
<html>
<head>
    <title>Digital Safety Toolkit</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            margin: 40px auto;
            width: 90%;
            max-width: 600px;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
        }

        textarea {
            width: 90%;
            height: 120px;
            padding: 10px;
        }

        button {
            margin: 10px;
            padding: 10px 15px;
            background: #203a43;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0f2027;
        }

        #output {
            margin-top: 20px;
            font-weight: bold;
            white-space: pre-line;
        }

        .low { color: green; }
        .medium { color: orange; }
        .high { color: red; }

    </style>
</head>

<body>

<h1>🛡️ Digital Safety Toolkit</h1>

<div class="container">

    <textarea id="text" placeholder="Enter your message..."></textarea>

    <br>

    <button onclick="check('Spam')">Spam Check</button>
    <button onclick="check('Phishing')">Phishing Check</button>
    <button onclick="check('Fake News')">Fake News Check</button>

    <p id="output"></p>

</div>

<script>

function getText() {
    var text = document.getElementById("text").value;

    if (text == "") {
        document.getElementById("output").innerText = "Please enter some text!";
        return null;
    }

    return text;
}

function check(type) {

    var text = getText();
    if (text == null) {
        return;
    }

    fetch("/check", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            text: text,
            type: type
        })
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {

        var output = document.getElementById("output");

        output.innerText =
            type + " Result: " + data.result +
            "\n\nReasons:\n" + data.reason +
            "\nAdvice:\nAlways verify before trusting.";

        output.className = data.level;
    });

}

</script>

</body>
</html>
